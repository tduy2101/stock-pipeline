services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: stock-pipeline-db
    environment:
      POSTGRES_USER: stock
      POSTGRES_PASSWORD: stock
      POSTGRES_DB: stock_pipeline
    ports:
      - "55432:5432"
    shm_size: "512mb"
    volumes:
      - stock_pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stock -d stock_pipeline"]
      interval: 3s
      timeout: 5s
      retries: 10

volumes:
  stock_pgdata:
